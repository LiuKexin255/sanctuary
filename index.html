---
layout: default
title: Home
---

<head>
    <meta charset="utf-8">
    <title>{{ site.title }}</title>
    <style>
        .github-link {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            margin-top: 40px;
            border-top: 1px solid #eee;
            color: #666;
        }
    </style>
</head>

<h2>最新文章</h2>
<ul>
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url|relative_url }}">{{ post.title }}</a>
      <span>{{ post.date | date: "%Y-%m-%d" }}</span>
    </li>
  {% endfor %}
</ul>

<div class="github-link">
    <a href="{{ site.github.repo }}">View on GitHub</a>
</div>
