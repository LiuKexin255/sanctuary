---
layout: default
title: Home
---

<head>
    <meta charset="utf-8">
    <title>{{ site.title }}</title>
    <style>
        .github-link {
            position: absolute;
            left: 20px;
            bottom: 20px;
            font-size: 14px;
        }
        .page-container {
            position: relative;
            padding-bottom: 60px;
        }
    </style>
</head>

<body>
    <div class="page-container">
        <h2>最新文章</h2>
        <ul>
        {% for post in site.posts %}
            <li>
            <a href="{{ post.url|relative_url }}">{{ post.title }}</a>
            <span>{{ post.date | date: "%Y-%m-%d" }}</span>
            </li>
        {% endfor %}
        </ul>

        <div class="github-link">
            <a href="{{ site.github.repo }}">View on GitHub</a>
        </div>
    </div>
</body>
