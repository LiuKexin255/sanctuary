---
layout: default
title: Home
---
<body>
    <div class="page-container">
        <h2>最新文章 | <a href="{{ site.github.repo }}">View on GitHub</a> </h2>
        <ul>
        {% for post in site.posts %}
            <li>
            <a href="{{ post.url|relative_url }}">{{ post.title }}</a>
            <span>{{ post.date | date: "%Y-%m-%d" }}</span>
            </li>
        {% endfor %}
        </ul>
    </div>
</body>
