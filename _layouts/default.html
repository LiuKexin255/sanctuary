<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="utf-8">
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">

<style>

body {
  margin: 0;
  background: #ffffff;
}

.markdown-body {
  box-sizing: border-box;
  max-width: 980px;
  margin: 0 auto;
  padding: 40px;
}

@media (max-width: 767px) {
  .markdown-body {
    padding: 20px;
  }
}

</style>

</head>

<body>

<article class="markdown-body">
{{ content }}
</article>

</body>
</html>
